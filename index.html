<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./images/logo_black.ico" sizes="any" />
    <link rel="svg" href="./images/logo_black.svg" type="image/svg+xml" />
    <link
      rel="apple-touch-icon"
      href="./images/logo_black.png"
      type="image/png"
    />
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <link rel="stylesheet" href="/styles/global.css" />
    <link rel="stylesheet" href="/styles/variables.css" />
    <link rel="stylesheet" href="/styles/style.css" />
    <title>SwagMusic</title>
  </head>
  <body class="page">
    <header class="header">
      <nav class="header__menu">
        <ul class="menu__list">
          <li class="menu__list-item">
            <a class="menu-link" href="#0">Главная</a>
          </li>
          <li class="menu__list-item">
            <a class="menu-link" href="#0">Плейлисты</a>
          </li>
          <li class="menu__list-item">
            <div class="search">
              <label for="">
                <input type="text" placeholder="Поиск" />
              </label>
            </div>
          </li>
        </ul>
        <a class="menu__list-logo">
          <img class="logo" src="./images/logo.gif" />
          <span class="logo-name">SwAg MuSSSiC</span>
        </a>
        <ul class="menu__list">
          <li class="menu__list-item">
            <a class="menu-link" href="#0">Блог</a>
          </li>
          <li class="menu__list-item">
            <a class="menu-link" href="#0">Информация</a>
          </li>
          <li class="menu__list-item profil">
            <a class="menu-link" href="#0">
              <img class="menu-link-avatar" src="./images/avatar.jpg">
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="favorits">
        <div class="favorits__imgs">
          <img class="favorits__img" src="./images/skateFirst.jpeg" alt="" />
          <img class="favorits__img" src="./images/favorit.jpg" alt="" />
          <img class="favorits__img" src="./images/fallThird.jpeg" alt="" />
        </div>
        <div class="favorits__text">
          <h1 class="favorits__title">Выбери свой вайб</h1>
          <h2 class="favorits__subtitle">Новинки 2023</h2>
        </div>
        <button class="favorits__btn">Слушать</button>
      </section>
      <section class="albums">
        <ul class="albums__list">
          <li class="albums__list-item">
            <button class="albums__link" onclick="window['dialog'].showModal();"
            aria-controls="dialog">
              <div class="albums__logo">
                <img class="albums__img" src="./images/Superheaven.jpeg" alt="" />
                <svg class="albums__logo-btn" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M320-200v-560l440 280-440 280Zm80-280Zm0 134 210-134-210-134v268Z"/></svg>
              </div>
              <div class="albums__info">
                <h2 class="albums__name">Jar</h2>
                <span class="albums__executor">Superheaven</span>
              </div>
            </и>
          </li>
        </ul>
        <dialog class="albums__dialog" id="dialog">
          <div class="dialog__header">
            <img class="dialog__img" src="./images/Superheaven.jpeg">
            <div class="dialog__header-info">
              <h3 class="albums__name">Jar</h3>
              <h4 class="albums__executor">Superheaven</h4>
            </div>
          </div>
          <button class="shuffle">
            <svg class="shuffle-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <use href="./svg/shuffle.svg#shuffle"></use>
            </svg>
            <h5 class="shuffle-text">Shuffle all</h5>
          </button>
          <ul class="dialog__list" id="jar">
          </ul>
        </dialog>
      </section>
      <section class="about"></section>
      <section class="music">
        <ul class="music__menu">
          <li class="music__menu-item">
            <div class="music__menu__info">
              <img class="music__menu__info-logo" src="./images/fallThird.jpeg" alt="">
              <div class="music__menu__info-box">
                <h4 class="music__menu__info-name"></h4>
                <span class="music__menu__info-executor"></span>
              </div>
              <svg class="music__menu__info-plus" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24">
                <use href="./svg/heart.svg#heart"></use>
              </svg>
            </div>
          </li>
          <li class="music__menu-item">
            <div class="music__menu__play">
              <button class="music__menu-button" id="menu-shuffle">
                <svg class="menu-threme-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <use href="./svg/shuffle.svg#shuffle"></use>
                </svg>
              </button>
              <button class="music__menu-button" id="menu-back">
                <svg class="menu-threme-svg menu-back-btn" fill="none" height="16" viewBox="0 0 16 16" width="16" xmlns="http://www.w3.org/2000/svg"><g><path d="m2 2.96495c0-.81082.91427-1.28456 1.57668-.81697l7.13302 5.03504c.5644.39841.5644 1.23552 0 1.63393l-7.13302 5.03505c-.66241.4676-1.57668-.0062-1.57668-.817z"/><path d="m14 2.75c0-.41421-.3358-.75-.75-.75s-.75.33579-.75.75v10.5c0 .4142.3358.75.75.75s.75-.3358.75-.75z"/></g></svg>               
              </button>
              <button class="music__menu-button play-icon-btn" id="menu-play">
                <svg class="play-icon" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M8 6.82v10.36c0 .79.87 1.27 1.54.84l8.14-5.18c.62-.39.62-1.29 0-1.69L9.54 5.98C8.87 5.55 8 6.03 8 6.82z"/></svg>
              </button>
              <button class="music__menu-button" id="menu-next">
                <svg class="menu-threme-svg" height="16" viewBox="0 0 16 16" width="16" xmlns="http://www.w3.org/2000/svg"><g><path d="m2 2.96495c0-.81082.91427-1.28456 1.57668-.81697l7.13302 5.03504c.5644.39841.5644 1.23552 0 1.63393l-7.13302 5.03505c-.66241.4676-1.57668-.0062-1.57668-.817z"/><path d="m14 2.75c0-.41421-.3358-.75-.75-.75s-.75.33579-.75.75v10.5c0 .4142.3358.75.75.75s.75-.3358.75-.75z"/></g></svg>
              </button>
              <button class="music__menu-button" id="menu-repeat">
                <svg class="menu-threme-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20.924 5.617a.997.997 0 0 0-.217-.324l-3-3a1 1 0 1 0-1.414 1.414L17.586 5H8a5 5 0 0 0-5 5v2a1 1 0 1 0 2 0v-2a3 3 0 0 1 3-3h9.586l-1.293 1.293a1 1 0 0 0 1.414 1.414l3-3A.997.997 0 0 0 21 6m-.076-.383a.996.996 0 0 1 .076.38l-.076-.38zm-17.848 12a.997.997 0 0 0 .217 1.09l3 3a1 1 0 0 0 1.414-1.414L6.414 19H16a5 5 0 0 0 5-5v-2a1 1 0 1 0-2 0v2a3 3 0 0 1-3 3H6.414l1.293-1.293a1 1 0 1 0-1.414-1.414l-3 3m-.217.324a.997.997 0 0 1 .215-.322l-.215.322z"/></svg>
              </button>
            </div>
          </li>
          <li class="music__menu-item">
            <div class="music__menu__volume">
              <button class="music__menu-button">
                <svg class="menu-threme-svg" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M560-131v-82q90-26 145-100t55-168q0-94-55-168T560-749v-82q124 28 202 125.5T840-481q0 127-78 224.5T560-131ZM120-360v-240h160l200-200v640L280-360H120Zm440 40v-322q47 22 73.5 66t26.5 96q0 51-26.5 94.5T560-320ZM400-606l-86 86H200v80h114l86 86v-252ZM300-480Z"/></svg>
              </button>
              <input class="volume-range" type="range" id="volume" name="volume" min="0" max="1" step="0.1" value="0.2"/>
            </div>
          </li>
        </ul>
        <div class="track-range">
          <span class="time-this">0:00</span>
          <div class="progress">
            <div class="time-range"></div>
          </div>
          <span class="time-all"></span>
        </div>
      </section>
    </main>
    <footer class="footer"></footer>

    <template id="track-template">
      <li class="dialog__list-item">
        <button class="track-play">
          <svg class="play-svg" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M8 6.82v10.36c0 .79.87 1.27 1.54.84l8.14-5.18c.62-.39.62-1.29 0-1.69L9.54 5.98C8.87 5.55 8 6.03 8 6.82z"/></svg>
        </button>
        <a class="track__executor" href="#0">Superheaven</a>
        <span>-</span>
        <a class="track__name" href="#0">Crawl</a>
        <button class="like-btn">
          <svg class="music__menu__info-plus" viewBox="0 0 24 24" height="24" width="24" xmlns="http://www.w3.org/2000/svg">
            <use href="./svg/heart.svg#heart"></use>
          </svg>
        </button>
        <span class="track-time">3:01</span>
      </li>
    </template>
    <script type="module" src="./scripts/tracks.js"></script>
    <script type="module" src="./scripts/scripts.js"></script>
  </body>
</html>
